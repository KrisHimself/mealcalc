<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Meal Prep Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e4e6ed;
    --text-dim: #8b8fa3;
    --accent: #6c8cff;
    --accent-dim: #4a62b3;
    --danger: #ff5c5c;
    --danger-dim: #4a2020;
    --radius: 12px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  html { font-size: 16px; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding: 0 0 2rem;
    -webkit-tap-highlight-color: transparent;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.25rem;
    backdrop-filter: blur(12px);
  }

  header h1 {
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 1rem 1rem 0;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.1rem;
  }

  .card-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 0.75rem;
  }

  .row {
    display: flex;
    gap: 0.75rem;
  }

  .field {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  label {
    font-size: 0.8rem;
    color: var(--text-dim);
    font-weight: 500;
  }

  input[type="number"], input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    color: var(--text);
    font-size: 1rem;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="number"] { -moz-appearance: textfield; }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
  }

  input[type="number"]:focus, input[type="text"]:focus {
    border-color: var(--accent);
  }

  .person-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 0.6rem;
  }

  .person-badge {
    width: 2rem;
    height: 2rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    flex-shrink: 0;
    color: #1a1d27;
  }

  .person-name-input {
    width: 3.2rem !important;
    flex: 0 0 auto;
    text-align: center;
    padding: 0.6rem 0.3rem !important;
    font-weight: 600;
  }

  .person-row .field { flex: 1; }

  .btn-remove {
    width: 2rem;
    height: 2rem;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    font-family: var(--font);
    line-height: 1;
    padding: 0;
  }

  .btn-remove:active {
    background: var(--danger-dim);
    border-color: var(--danger);
    color: var(--danger);
  }

  .btn-add {
    width: 100%;
    padding: 0.55rem;
    border-radius: 8px;
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 0.8rem;
    font-family: var(--font);
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 0.2rem;
  }

  .btn-add:active {
    border-color: var(--accent);
    color: var(--accent);
  }

  .tare-section { display: flex; flex-direction: column; gap: 0.6rem; }

  .tare-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.35rem 0.7rem;
    font-size: 0.75rem;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: var(--font);
    user-select: none;
  }

  .chip:active, .chip.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--text);
  }

  .chip .chip-weight {
    color: var(--text);
    font-weight: 600;
    margin-left: 0.15rem;
  }

  .results-card {
    border-color: var(--accent-dim);
    background: linear-gradient(135deg, var(--surface) 0%, #1c2035 100%);
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
  }

  .result-grid.full { grid-template-columns: 1fr; }

  .result-box {
    background: var(--surface2);
    border-radius: 8px;
    padding: 0.7rem 0.8rem;
    text-align: center;
  }

  .result-label {
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 0.25rem;
  }

  .result-value {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .result-unit {
    font-size: 0.8rem;
    font-weight: 400;
    color: var(--text-dim);
    margin-left: 0.1rem;
  }

  .placeholder-msg {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.85rem;
    padding: 1rem 0;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 0.5rem 0;
  }

  .people-list { display: flex; flex-direction: column; }

  .portions-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 0.6rem;
  }

  @media (min-width: 600px) {
    .container { padding: 1.5rem 1.5rem 0; }
    .card { padding: 1.25rem 1.35rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Meal Prep Calc</h1>
</header>

<div class="container">

  <div class="card">
    <div class="card-title">People &amp; Days</div>
    <div class="people-list" id="people-list"></div>
    <button class="btn-add" id="btn-add-person">+ Add person</button>
    <div class="divider"></div>
    <div class="field" style="margin-top:0.4rem;">
      <label for="days">Meal prep days</label>
      <input type="number" id="days" value="4" inputmode="numeric" min="1">
    </div>
  </div>

  <div class="card">
    <div class="card-title">Weight</div>
    <div class="tare-section">
      <div class="row">
        <div class="field">
          <label for="gross">Gross weight (g)</label>
          <input type="number" id="gross" placeholder="e.g. 4000" inputmode="numeric" autocomplete="off">
        </div>
        <div class="field">
          <label for="tare">Tare (g)</label>
          <input type="number" id="tare" placeholder="e.g. 930" inputmode="numeric" autocomplete="off">
        </div>
      </div>
      <label style="margin-top:0.2rem;">Quick tare</label>
      <div class="tare-chips" id="tare-chips"></div>
    </div>
  </div>

  <div class="card results-card" id="results-card">
    <div class="card-title">Results</div>
    <div id="results-body">
      <p class="placeholder-msg">Enter gross weight and tare to see portions.</p>
    </div>
  </div>

</div>

<script>
const COLORS = [
  '#ff7a5c', '#5ce0d8', '#a78bfa', '#facc15',
  '#f472b6', '#34d399', '#fb923c', '#60a5fa',
  '#e879f9', '#4ade80',
];

const TARE_ITEMS = [
  { name: 'Big pot', weight: 930 },
  { name: 'Med pot', weight: 750 },
  { name: 'Sm pot', weight: 592 },
  { name: 'Big bowl', weight: 208 },
  { name: 'Med bowl', weight: 159 },
  { name: 'Sm bowl', weight: 110 },
  { name: '32cm SS pan', weight: 1990 },
  { name: '28cm SS pan', weight: 1752 },
  { name: '24cm teflon pan', weight: 594 },
];

const $ = id => document.getElementById(id);

let people = [
  { name: 'K', kcal: 750 },
  { name: 'L', kcal: 425 },
];
let colorIndex = people.length;

function renderPeople() {
  const list = $('people-list');
  list.innerHTML = '';
  people.forEach((p, i) => {
    const color = COLORS[i % COLORS.length];
    const row = document.createElement('div');
    row.className = 'person-row';
    row.innerHTML = `
      <div class="person-badge" style="background:${color}">${(p.name || '?')[0].toUpperCase()}</div>
      <input type="text" class="person-name-input" value="${p.name}" maxlength="6"
             data-idx="${i}" placeholder="Name">
      <div class="field">
        <label>kcal / portion</label>
        <input type="number" value="${p.kcal}" inputmode="numeric" data-idx="${i}" class="person-kcal-input">
      </div>
      <button class="btn-remove" data-idx="${i}" aria-label="Remove">&times;</button>
    `;
    list.appendChild(row);
  });

  list.querySelectorAll('.person-name-input').forEach(el => {
    el.addEventListener('input', e => {
      const idx = parseInt(e.target.dataset.idx);
      people[idx].name = e.target.value;
      const badge = e.target.previousElementSibling;
      badge.textContent = (e.target.value || '?')[0].toUpperCase();
      calc();
    });
  });

  list.querySelectorAll('.person-kcal-input').forEach(el => {
    el.addEventListener('input', e => {
      const idx = parseInt(e.target.dataset.idx);
      people[idx].kcal = parseFloat(e.target.value) || 0;
      calc();
    });
  });

  list.querySelectorAll('.btn-remove').forEach(el => {
    el.addEventListener('click', e => {
      const idx = parseInt(e.currentTarget.dataset.idx);
      people.splice(idx, 1);
      renderPeople();
      calc();
    });
  });
}

$('btn-add-person').addEventListener('click', () => {
  people.push({ name: '', kcal: 0 });
  colorIndex++;
  renderPeople();
  const inputs = $('people-list').querySelectorAll('.person-name-input');
  inputs[inputs.length - 1].focus();
});

let activeChip = null;
const chipsEl = $('tare-chips');

TARE_ITEMS.forEach((item, i) => {
  const btn = document.createElement('button');
  btn.className = 'chip';
  btn.innerHTML = `${item.name} <span class="chip-weight">${item.weight}g</span>`;
  btn.addEventListener('click', () => {
    if (activeChip === i) {
      activeChip = null;
      btn.classList.remove('active');
      $('tare').value = '';
    } else {
      chipsEl.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      activeChip = i;
      btn.classList.add('active');
      $('tare').value = item.weight;
    }
    calc();
  });
  chipsEl.appendChild(btn);
});

$('tare').addEventListener('input', () => {
  chipsEl.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  activeChip = null;
  const val = parseFloat($('tare').value);
  TARE_ITEMS.forEach((item, i) => {
    if (item.weight === val) {
      chipsEl.children[i].classList.add('active');
      activeChip = i;
    }
  });
  calc();
});

$('days').addEventListener('input', calc);
$('gross').addEventListener('input', calc);

function calc() {
  const days = parseInt($('days').value) || 0;
  const gross = parseFloat($('gross').value);
  const tare = parseFloat($('tare').value);
  const body = $('results-body');

  if (isNaN(gross) || isNaN(tare) || days <= 0) {
    body.innerHTML = '<p class="placeholder-msg">Enter gross weight and tare to see portions.</p>';
    return;
  }

  const net = gross - tare;
  if (net <= 0) {
    body.innerHTML = '<p class="placeholder-msg">Net weight must be positive.</p>';
    return;
  }

  const totalKcal = people.reduce((s, p) => s + p.kcal, 0);
  if (totalKcal <= 0) {
    body.innerHTML = '<p class="placeholder-msg">Set at least one person\'s kcal.</p>';
    return;
  }

  const perDay = net / days;
  const ratio = perDay / totalKcal;
  const fmt = v => v % 1 === 0 ? v.toString() : v.toFixed(1);

  const portionBoxes = people
    .filter(p => p.kcal > 0)
    .map((p, i) => {
      const portion = ratio * p.kcal;
      const color = COLORS[people.indexOf(p) % COLORS.length];
      const label = p.name || '?';
      return `<div class="result-box">
        <div class="result-label">${label} per day</div>
        <div class="result-value" style="color:${color}">${fmt(portion)}<span class="result-unit">g</span></div>
      </div>`;
    })
    .join('');

  body.innerHTML = `
    <div class="result-grid full">
      <div class="result-box">
        <div class="result-label">Net weight</div>
        <div class="result-value">${fmt(net)}<span class="result-unit">g</span></div>
      </div>
    </div>
    <div style="height:0.5rem"></div>
    <div class="result-grid">
      <div class="result-box">
        <div class="result-label">Per day</div>
        <div class="result-value">${fmt(perDay)}<span class="result-unit">g</span></div>
      </div>
      <div class="result-box">
        <div class="result-label">g / kcal</div>
        <div class="result-value">${ratio.toFixed(3)}</div>
      </div>
    </div>
    <div style="height:0.5rem"></div>
    <div class="portions-grid">${portionBoxes}</div>
  `;
}

renderPeople();
$('gross').value = '';
$('tare').value = '';
$('days').value = 4;
</script>
</body>
</html>
